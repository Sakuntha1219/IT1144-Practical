<!DOCTYPE html>
<html>
<head>
    <title>Delivery Lanka</title>
    <style>
        /* This section makes the video fill the whole screen */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%; 
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* This creates the space at the top for your Nav Bar */
        nav {
            margin: 50px auto 0 auto;
            width: 90%;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            text-align: center;
            border-radius: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 50px;
            font-weight: bold;
        }

        /* This container forces the form to the left side */
        .content-wrapper {
            padding: 50px;
            display: flex;
            justify-content: flex-start;
        }

        /* This is the GLASS FORM style */
        .order-form {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .order-form h2 {
            color: black;
            margin-bottom: 20px;
            text-align: center;
        }

        /* This makes inputs stack vertically like in your photo */
        .order-form input, .order-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid white;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box; /* VERY IMPORTANT: keeps inputs inside the box */
        }

        .order-form button {
            width: 100%;
            padding: 12px;
            background: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .order-form button:hover {
            background: #ff9900;
            color: white;
        }
		
		h5{ 
		
		color:black;
		text-align:center;
		
		}
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="D:/html practical/Delivery Service Animated Promo Video.mp4" type="video/mp4">
    </video>

    <nav>
        <a href="#">HOME</a>
        <a href="#">TRACKING</a>
        <a href="#">SHIPPING</a>
        <a href="#">ABOUT US</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="content-wrapper">
        <div class="order-form">
            <h2>Place Your Order</h2>
            <form>
                <input type="text" placeholder="Full Name">
                <textarea placeholder="Delivery Address" rows="3"></textarea>
                <input type="text" placeholder="Phone Number">
                <button type="submit">Place Order</button>
            </form>
        </div>
    </div>
	<br>
	<br>
	
	<h5><b>@All Rights Reserved 2026 / Website Made By : Sakuntha Sasi Prabhath Form UOV</h5></b>

</body>
</html>
