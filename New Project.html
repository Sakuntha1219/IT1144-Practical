<!DOCTYPE html>
<html>

<title>

<style>
body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Video Background Styling */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100; /* Keeps video at the very back */
            transform: translate(-50%, -50%); /* Centers the video */
            background-size: cover;
        }

        /* Navigation Bar with Space from Top */
        nav {
            margin-top: 60px; /* This creates the space from the upper part */
            background: rgba(0, 0, 0, 0.6); /* Semi-transparent black */
            padding: 15px 0;
            text-align: center;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
            border-radius: 8px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 25px;
            font-size: 18px;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #ff9900;
        }

        .hero-text {
            color: white;
            text-align: center;
            margin-top: 10%;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
		
		li {
display:inline;
margin-right:20px;


        .main-content {
            display: flex;
            justify-content: flex-start; /* Aligns form to the left */
            padding-left: 50px;
            margin-top: 50px;
        }

        /* 4. The Glass Form Box */
        .glass-box {
            background: rgba(255, 255, 255, 0.15); /* Translucent white */
            backdrop-filter: blur(15px); /* This makes the glass blur */
            -webkit-backdrop-filter: blur(15px); /* Support for Safari */
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px;
            width: 350px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .glass-box h2 {
            margin-top: 0;
            border-bottom: 2px solid white;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        /* Styling Inputs to be vertical */
        .glass-box input, .glass-box textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            display: block; /* Forces them to be on new lines */
            box-sizing: border-box; 
        }

        .glass-box input::placeholder, .glass-box textarea::placeholder {
            color: #eeeeee;
        }

        /* Place Order Button */
        .glass-box button {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .glass-box button:hover {
            background: #ff9900;
            color: white;
        }

    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">

<div class="main-content">
        <div class="glass-box">
            <h2>Place Your Order</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <textarea placeholder="Delivery Address" rows="3" required></textarea>
                <input type="tel" placeholder="Phone Number" required>
                <button type="submit">Place Order</button>
            </form>
        </div>
    </div>
</body>
